<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Selling Website</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0;
    background:#f4f4f4;
}

/* Header */
header{
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
}

/* Container */
.container{
    padding:15px;
}

/* Car Card */
.car-card{
    background:white;
    margin-bottom:20px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.car-card img{
    width:100%;
    height:auto;
}

.car-info{
    padding:15px;
}

.price{
    color:green;
    font-size:20px;
    font-weight:bold;
}

/* Button */
.btn{
    display:block;
    text-align:center;
    background:#000;
    color:white;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    margin-top:10px;
}

/* Footer */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}

@media (min-width:600px){
    .container{
        width:80%;
        margin:auto;
    }
}
</style>

</head>

<body>

<header>
<h2>🚗 Car Selling Website</h2>
<p>Owner: Ramswarup Bangda</p>
</header>

<div class="container">

<div class="car-card">
<img src="https://via.placeholder.com/400x200" alt="Car">
<div class="car-info">
<h3>Luxury Car</h3>
<p>Best quality comfortable car for sale.</p>
<p class="price">$15000</p>
<a href="#" class="btn">Contact Seller</a>
</div>
</div>

<div class="car-card">
<img src="https://via.placeholder.com/400x200" alt="Car">
<div class="car-info">
<h3>Sport Car</h3>
<p>High speed sporty car available.</p>
<p class="price">$25000</p>
<a href="#" class="btn">Contact Seller</a>
</div>
</div>

</div>

<footer>
<p>© 2026 Ramswarup Bangda. All Rights Reserved.</p>
</footer>

</body>
</html>
